name: Build Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.3'

      - name: Build (with log)
        run: gradle build --no-daemon -x test 2>&1 | tee build-output.txt; exit ${PIPESTATUS[0]}

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-output.txt

      - name: Upload JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pulsevisual-jar
          path: build/libs/pulsevisual-1.0.0.jar
