name: Build Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.3'

      - name: Build
        run: gradle build --no-daemon -x test

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: pulsevisual-jar
          path: build/libs/pulsevisual-1.0.0.jar
