name: Build Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle Wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.3-bin.zip -O gradle.zip
          unzip -q gradle.zip
          ./gradle-8.3/bin/gradle wrapper --gradle-version 8.3
          chmod +x gradlew

      - name: Build
        run: ./gradlew build --no-daemon -x test

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: pulsevisual-jar
          path: build/libs/pulsevisual-1.0.0.jar
